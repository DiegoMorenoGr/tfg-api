services:
  tfg-api-v2:
    build: .
    container_name: tfg-api-v5
    ports:
      - "8002:8000"
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      DEFAULT_ENGINE: ${DEFAULT_ENGINE}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD}
      API_KEY: ${API_KEY}